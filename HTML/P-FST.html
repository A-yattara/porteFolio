<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FST - Portfolio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <link rel="stylesheet" href="../CSS/style-heade-foter.css" />
  </head>

  <body class="page">
    <div data-include="includes/header.html"></div>

    <main>
      <section style="padding: 2.5rem 0">
        <div class="container-xl">
          <div class="reveal">
            <h1 class="text-4xl md:text-5xl font-extrabold">
              Faculté des Sciences (FST)
            </h1>
            <p class="mt-3" style="color: rgba(255, 255, 255, 0.74)">
              Licence · Maintenance Réseaux
            </p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
            <div class="card card-pad reveal">
              <h2 class="text-2xl font-extrabold">Compétences consolidées</h2>
              <ul
                class="mt-3"
                style="
                  color: rgba(255, 255, 255, 0.78);
                  list-style: disc;
                  padding-left: 1.25rem;
                "
              >
                <li>Fondamentaux réseaux</li>
                <li>Maintenance et résolution d'incidents</li>
                <li>Travail en équipe & méthode</li>
              </ul>
            </div>
            <div class="card card-pad reveal">
              <h2 class="text-2xl font-extrabold">Détails</h2>
              <p class="mt-3" style="color: rgba(255, 255, 255, 0.74)">
                Page prête à être enrichie avec des projets, rapports,
                certificats ou liens.
              </p>
              
            </div>
          </div>
        </div>
      </section>
      <div class="mt-4 flex justify-center">
                <a class="btn" href="projets.html"
                  ><i class="fa-solid fa-arrow-left" aria-hidden="true"></i
                  >Retour</a
                >
      </div>
    </main>

    <button id="toTop" class="btn" type="button" aria-label="Revenir en haut">
      <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
    </button>

    <div data-include="includes/footer.html"></div>

    <script src="../JS/app.js" defer></script>
  </body>
</html>
